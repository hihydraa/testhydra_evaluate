<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K.C. HEART Evaluation</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f9; padding:24px; }
    .wrap { max-width:1100px; margin:auto; }
    .head { background:#173b6c; color:white; padding:20px; border-radius:14px; }
    .card { background:white; padding:18px; border-radius:14px; margin:14px 0; box-shadow:0 2px 8px #0001; }
    .emp { cursor:pointer; border-left:6px solid #173b6c; }
    .emp:hover { background:#eef5ff; }
    .q { border:1px solid #ddd; padding:16px; border-radius:12px; margin:12px 0; background:white; }
    .core { color:#173b6c; font-weight:bold; margin-bottom:8px; }
    .meta { color:#666; font-size:13px; margin-top:8px; line-height:1.5; }
    button { background:#173b6c; color:white; border:0; padding:12px 18px; border-radius:10px; cursor:pointer; }
    button.gray { background:#777; }
    button:disabled { background:#aaa; cursor:not-allowed; }
    textarea { width:100%; min-height:55px; margin-top:10px; box-sizing:border-box; }
    .score label { margin-right:12px; display:inline-block; margin-top:10px; }
    .loading { text-align:center; padding:24px; color:#666; }
  </style>
</head>

<body>
<div class="wrap">
  <div class="head">
    <h2>K.C. HEART Core Value Evaluation</h2>
    <div>ผู้ประเมิน: สุชานรี กองพลพรหม</div>
  </div>

  <div id="app"></div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby-T2AJE7CFzCAuZgGqo_cIHdkmoW7HGocKNyH6xvyTUKg4fZ5ulNhBTX-br4WMWOc4uQ/exec';
const EVALUATOR_NAME = 'สุชานรี กองพลพรหม';

let employees = [];
let selectedEmployee = null;
let questions = [];
let scoreGuide = [];
let submitting = false;

window.onload = async function () {
  await loadData();
};

function showLoading(text) {
  document.getElementById('app').innerHTML = `<div class="card loading">${text}</div>`;
}

function showError(error) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h3>เกิดข้อผิดพลาด</h3>
      <div>${error}</div>
      <br>
      <button onclick="loadData()">ลองใหม่</button>
    </div>
  `;
}

function api(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const callbackName =
      'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

    const script = document.createElement('script');

    window[callbackName] = function(data) {
      resolve(data);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    const params = new URLSearchParams();
    params.set('action', action);
    params.set('callback', callbackName);

    Object.keys(payload).forEach(key => {
      if (typeof payload[key] === 'object') {
        params.set(key, JSON.stringify(payload[key]));
      } else {
        params.set(key, payload[key]);
      }
    });

    script.src = `${WEB_APP_URL}?${params.toString()}`;

    script.onerror = function() {
      reject(new Error('โหลดข้อมูลจาก Apps Script ไม่สำเร็จ'));
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    document.body.appendChild(script);
  });
}

async function apiPost(action, payload = {}) {
  await fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
      action,
      ...payload
    })
  });

  return {
    success: true,
    message: 'บันทึกผลการประเมินเรียบร้อยแล้ว'
  };
}

async function loadData() {
  try {
    showLoading('กำลังโหลดรายชื่อพนักงานที่รอประเมิน...');

    const result = await api('init', {
      evaluatorName: EVALUATOR_NAME
    });

    if (!result.success) {
      throw new Error(result.message || 'โหลดข้อมูลไม่สำเร็จ');
    }

    employees = result.employees || [];
    scoreGuide = result.scoreGuide || [];

    renderEmployeeList();

  } catch (err) {
    showError(err.message || err);
  }
}

function renderEmployeeList() {
  const app = document.getElementById('app');

  if (employees.length === 0) {
    app.innerHTML = `<div class="card">ไม่มีรายชื่อพนักงานที่รอประเมิน</div>`;
    return;
  }

  let html = `<h3>รายชื่อพนักงานที่ยังไม่ประเมิน</h3>`;

  employees.forEach((emp, i) => {
    html += `
      <div class="card emp" onclick="openForm(${i})">
        <h3>${emp.employee}</h3>
        <div>ตำแหน่ง: ${emp.employeePosition}</div>
        <div>สังกัด: ${emp.bu}</div>
      </div>
    `;
  });

  app.innerHTML = html;
}

async function openForm(index) {
  try {
    selectedEmployee = employees[index];
    showLoading('กำลังโหลดแบบประเมิน...');

    const result = await api('getForm', {
      employeeData: selectedEmployee
    });

    if (!result.success) {
      throw new Error(result.message || 'โหลดแบบประเมินไม่สำเร็จ');
    }

    questions = result.questions || [];
    renderForm();

  } catch (err) {
    showError(err.message || err);
  }
}

function renderForm() {
  const app = document.getElementById('app');

  let guide = `<div class="card"><b>เกณฑ์การให้คะแนน</b><br>`;
  scoreGuide.forEach(g => {
    guide += `${g.score} = ${g.meaning} : ${g.description}<br>`;
  });
  guide += `</div>`;

  let html = `
    <div class="card">
      <h3>แบบประเมิน: ${selectedEmployee.employee}</h3>
      <div>ตำแหน่ง: ${selectedEmployee.employeePosition}</div>
      <div>สังกัด: ${selectedEmployee.bu}</div>
    </div>
    ${guide}
  `;

  if (questions.length === 0) {
    html += `
      <div class="card">ไม่พบคำถามของตำแหน่งนี้ในชีท ${selectedEmployee.bu}</div>
      <button class="gray" onclick="renderEmployeeList()">กลับ</button>
    `;
    app.innerHTML = html;
    return;
  }

  questions.forEach((q, i) => {
    html += `
      <div class="q">
        <div class="core">${q.coreValue}</div>
        <b>${i + 1}. ${q.checklist}</b>

        <div class="meta">
          หลักฐานที่ใช้ตรวจ: ${q.evidence || '-'}<br>
          วิธีตรวจสอบ: ${q.method || '-'}
        </div>

        <div class="score">
          ${[1,2,3,4,5].map(s => `
            <label>
              <input type="radio" name="score_${i}" value="${s}">
              ${s}
            </label>
          `).join('')}
        </div>

        <textarea id="note_${i}" placeholder="หมายเหตุเพิ่มเติม"></textarea>
      </div>
    `;
  });

  html += `
    <button class="gray" onclick="renderEmployeeList()">กลับ</button>
    <button id="submitBtn" onclick="submitEvaluation()">ส่งผลประเมิน</button>
  `;

  app.innerHTML = html;
}

async function submitEvaluation() {
  if (submitting) return;

  try {
    const answers = [];

    for (let i = 0; i < questions.length; i++) {
      const checked = document.querySelector(`input[name="score_${i}"]:checked`);

      if (!checked) {
        alert(`กรุณาให้คะแนนข้อที่ ${i + 1}`);
        return;
      }

      const q = questions[i];

      answers.push({
        ...q,
        score: checked.value,
        note: document.getElementById(`note_${i}`).value
      });
    }

    const payload = {
      evaluator: selectedEmployee.evaluator,
      evaluatorPosition: selectedEmployee.evaluatorPosition,
      employee: selectedEmployee.employee,
      employeePosition: selectedEmployee.employeePosition,
      bu: selectedEmployee.bu,
      answers
    };

    submitting = true;
    const btn = document.getElementById('submitBtn');
    if (btn) btn.disabled = true;

    showLoading('กำลังบันทึกผลการประเมิน...');

    await apiPost('submit', { payload });

    alert('บันทึกผลการประเมินเรียบร้อยแล้ว');

    submitting = false;
    await loadData();

  } catch (err) {
    submitting = false;
    showError(err.message || err);
  }
}
</script>
</body>
</html>
