<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    button {
      background: #173b6c;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    .gray { background: #666; }

    .employee {
      cursor: pointer;
      border-left: 5px solid #173b6c;
    }

    .employee:hover {
      background: #eef5ff;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app">Loading...</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby6NWH7qal1TvzcE4kK8D21ia_h3WWptA0oN5SXngb42IKfploqx4fmZpSKb829ZzdyRQ/exec";
const EVALUATOR_NAME = "สุชานรี กองพลพรหม";

let employees = [];
let questions = [];
let selected = null;

// ================= API =================
function api(action, payload = {}) {
  return new Promise((resolve) => {
    const cb = "cb_" + Date.now();

    window[cb] = (res) => {
      resolve(res);
      delete window[cb];
    };

    const script = document.createElement("script");

    const params = new URLSearchParams({
      action,
      callback: cb,
      evaluatorName: EVALUATOR_NAME,
      ...payload
    });

    script.src = WEB_APP_URL + "?" + params.toString();
    document.body.appendChild(script);
  });
}

// ================= INIT =================
window.onload = loadEmployees;

async function loadEmployees() {
  document.getElementById("app").innerHTML = "<div class='card'>Loading...</div>";

  const res = await api("init");

  employees = res.employees || [];

  renderList();
}

// ================= LIST =================
function renderList() {
  let html = `
    <div class="card">
      <h3>ผู้ประเมิน</h3>
      ${EVALUATOR_NAME}
    </div>

    <div class="card">
      <button onclick="loadEmployees()">📋 รายชื่อ</button>
      <button onclick="loadDashboard()">📊 Dashboard</button>
    </div>
  `;

  if (employees.length === 0) {
    html += `<div class="card">ไม่มีข้อมูล</div>`;
    document.getElementById("app").innerHTML = html;
    return;
  }

  employees.forEach((e, i) => {
    html += `
      <div class="card employee" onclick="openForm(${i})">
        <b>${e.employee}</b><br>
        ${e.employeePosition} | ${e.bu}
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

// ================= FORM =================
async function openForm(i) {
  selected = employees[i];

  document.getElementById("app").innerHTML = "<div class='card'>Loading form...</div>";

  const res = await api("getForm", {
    employeeData: JSON.stringify(selected)
  });

  questions = res.questions || [];

  renderForm();
}

function renderForm() {

  let html = `
    <div class="card">
      <h3>${selected.employee}</h3>
      ${selected.employeePosition} | ${selected.bu}
    </div>
  `;

  if (questions.length === 0) {
    html += `<div class="card">ไม่พบคำถาม</div>
    <button onclick="loadEmployees()">กลับ</button>`;
    document.getElementById("app").innerHTML = html;
    return;
  }

  questions.forEach((q, i) => {
    html += `
      <div class="card">
        <b>${q.coreValue}</b><br>
        ${q.checklist}<br><br>

        ${[1,2,3,4,5].map(s => `
          <label>
            <input type="radio" name="q${i}" value="${s}"> ${s}
          </label>
        `).join("")}

        <textarea id="n${i}" placeholder="หมายเหตุ"></textarea>
      </div>
    `;
  });

  html += `
    <button onclick="submit()">ส่งผล</button>
    <button class="gray" onclick="loadEmployees()">กลับ</button>
  `;

  document.getElementById("app").innerHTML = html;
}

// ================= SUBMIT =================
async function submit() {

  const answers = [];

  for (let i = 0; i < questions.length; i++) {

    const s = document.querySelector(`input[name="q${i}"]:checked`);

    if (!s) {
      alert("กรุณาให้คะแนนให้ครบ");
      return;
    }

    answers.push({
      ...questions[i],
      score: s.value,
      note: document.getElementById("n" + i).value
    });
  }

  document.getElementById("app").innerHTML = "<div class='card'>Saving...</div>";

  await api("submit", {
    payload: JSON.stringify({
      evaluator: EVALUATOR_NAME,
      employee: selected.employee,
      employeePosition: selected.employeePosition,
      bu: selected.bu,
      answers
    })
  });

  alert("บันทึกสำเร็จ");
  loadEmployees();
}

// ================= DASHBOARD =================
async function loadDashboard() {

  document.getElementById("app").innerHTML = "<div class='card'>Loading dashboard...</div>";

  const res = await api("getOverview", {
    evaluatorName: EVALUATOR_NAME
  });

  renderDashboard(res);
}

// ================= DASHBOARD RENDER =================
function renderDashboard(data) {

  const individual = data.individual || [];
  const benchmark = data.benchmark || [];

  let html = `
    <div class="card">
      <h3>📊 Dashboard</h3>

      <div>
        <b>ประเมินแล้ว:</b> ${data.totalEvaluated || 0}<br>
        <b>คะแนนเฉลี่ย:</b> ${(data.avgScore || 0).toFixed(2)}<br>
        <b>พนักงาน:</b> ${data.totalEmployees || 0}
      </div>
    </div>

    <div class="card">
      <h3>👤 Top 10</h3>
  `;

  individual
    .sort((a,b)=>b.avgScore-a.avgScore)
    .slice(0,10)
    .forEach(e=>{
      html += `
        <div class="card">
          <b>${e.employee}</b><br>
          ${e.position}<br>
          ⭐ ${e.avgScore.toFixed(2)}
        </div>
      `;
    });

  html += `
    </div>

    <div class="card">
      <h3>🏢 Position Chart</h3>
      <canvas id="chart"></canvas>
    </div>

    <button onclick="renderList()">กลับ</button>
  `;

  document.getElementById("app").innerHTML = html;

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: benchmark.map(b => b.position),
      datasets: [{
        label: "Avg Score",
        data: benchmark.map(b => b.avgScore)
      }]
    }
  });
}

</script>

</body>
</html>
