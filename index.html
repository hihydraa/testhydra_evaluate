<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K.C. HEART Evaluation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #1f2937;
      padding: 20px;
    }

    .wrap { max-width: 1100px; margin: auto; }

    .head {
      background: #173b6c;
      color: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .emp {
      cursor: pointer;
      border-left: 6px solid #173b6c;
    }

    .emp:hover {
      background: #eef5ff;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .box {
      background: #f8fafc;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .btn {
      background: #173b6c;
      color: white;
      border: 0;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn.gray { background: #64748b; }

    /* ======================
       SCORE FIX (1 → 5 left to right)
    ====================== */
    .score {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .score label {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      user-select: none;
    }

    .score input {
      display: none;
    }

    /* LEFT → RIGHT ORDER (1 worst → 5 best) */
    .score input[value="1"]:checked + label { background: #dc2626; color: white; }
    .score input[value="2"]:checked + label { background: #ea580c; color: white; }
    .score input[value="3"]:checked + label { background: #d97706; color: white; }
    .score input[value="4"]:checked + label { background: #65a30d; color: white; }
    .score input[value="5"]:checked + label { background: #16a34a; color: white; }

    textarea {
      width: 100%;
      min-height: 60px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      resize: vertical;
    }

    /* ======================
       FIX TEXT OVERFLOW
    ====================== */
    .card, .box {
      word-wrap: break-word;
      overflow-wrap: break-word;
      line-height: 1.5;
    }

    .question {
      font-weight: 600;
      margin: 8px 0;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="head">
    <h2>K.C. HEART Evaluation System</h2>
    <div id="userInfo">ผู้ประเมิน: -</div>
  </div>

  <div id="app"></div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby6NWH7qal1TvzcE4kK8D21ia_h3WWptA0oN5SXngb42IKfploqx4fmZpSKb829ZzdyRQ/exec";

let EVALUATOR_NAME = "";
let employees = [];
let selected = null;
let questions = [];
let dashboard = null;

/* =========================
   INIT
========================= */
window.onload = () => {
  const url = new URLSearchParams(window.location.search);
  EVALUATOR_NAME = url.get("evaluator") || "สุชานรี กองพลพรหม";

  document.getElementById("userInfo").innerText =
    "ผู้ประเมิน: " + EVALUATOR_NAME;

  loadData();
};

/* =========================
   API
========================= */
function api(action, payload = {}) {
  const cb = "cb_" + Date.now();

  return new Promise((resolve, reject) => {
    window[cb] = (res) => {
      resolve(res);
      delete window[cb];
    };

    const script = document.createElement("script");

    const params = new URLSearchParams();
    params.append("action", action);
    params.append("callback", cb);
    params.append("evaluatorName", EVALUATOR_NAME);

    Object.keys(payload).forEach(k => {
      params.append(k, JSON.stringify(payload[k]));
    });

    script.src = WEB_APP_URL + "?" + params.toString();
    script.onerror = () => reject("API error");

    document.body.appendChild(script);
  });
}

/* =========================
   LOAD DATA (FIX SAFE)
========================= */
async function loadData() {
  try {
    const res = await api("init");
    dashboard = await api("dashboard");

    employees = res.employees || [];

    // FIX: กัน null crash
    dashboard = dashboard || {
      individual: [],
      benchmark: [],
      buSummary: []
    };

    renderHome();

  } catch (err) {
    document.getElementById("app").innerHTML =
      `<div class="card">โหลดข้อมูลไม่สำเร็จ</div>`;
  }
}

/* =========================
   HOME
========================= */
function renderHome() {

  let html = `
    <div class="card">
      <div class="section-title">📊 Dashboard Summary</div>

      <div class="grid">
        <div class="box">
          <b>Overall Avg</b><br>
          ${(dashboard.individual?.length
            ? (dashboard.individual.reduce((a,b)=>a+b.avgScore,0)/dashboard.individual.length).toFixed(2)
            : 0)}
        </div>

        <div class="box">
          <b>Employees</b><br>
          ${dashboard.individual?.length || 0}
        </div>

        <div class="box">
          <b>Total Answers</b><br>
          ${dashboard.rawCount || 0}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">👤 รายชื่อรอประเมิน</div>
  `;

  employees.forEach((e,i) => {
    html += `
      <div class="card emp" onclick="openForm(${i})">
        <b>${e.employee}</b><br>
        ${e.employeePosition} | ${e.bu}
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

/* =========================
   FORM
========================= */
async function openForm(i) {
  selected = employees[i];
  const res = await api("getForm", { employeeData: selected });

  questions = res.questions || [];

  let html = `
    <div class="card">
      <b>${selected.employee}</b><br>
      ${selected.employeePosition} | ${selected.bu}
    </div>
  `;

  questions.forEach((q, i) => {
    html += `
      <div class="card">
        <div><b>${q.coreValue}</b></div>

        <div class="question">${q.checklist}</div>

        <div class="score">
          ${[1,2,3,4,5].map(s => `
            <div>
              <input type="radio" id="s${i}_${s}" name="q${i}" value="${s}">
              <label for="s${i}_${s}">${s}</label>
            </div>
          `).join("")}
        </div>

        <textarea id="n${i}" placeholder="หมายเหตุ"></textarea>
      </div>
    `;
  });

  html += `
    <button class="btn" onclick="submit()">Submit</button>
    <button class="btn gray" onclick="loadData()">Back</button>
  `;

  document.getElementById("app").innerHTML = html;
}

/* =========================
   SUBMIT
========================= */
async function submit() {

  const answers = [];

  for (let i=0;i<questions.length;i++) {
    const score = document.querySelector(`input[name=q${i}]:checked`);
    if (!score) return alert("กรุณาให้คะแนนให้ครบ");

    answers.push({
      ...questions[i],
      score: score.value,
      note: document.getElementById("n"+i).value
    });
  }

  await api("submit", {
    payload: {
      evaluator: EVALUATOR_NAME,
      evaluatorPosition: "",
      employee: selected.employee,
      employeePosition: selected.employeePosition,
      bu: selected.bu,
      answers
    }
  });

  alert("บันทึกสำเร็จ");
  loadData();
}

</script>
</body>
</html>
