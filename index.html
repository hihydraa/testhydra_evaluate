<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K.C. HEART Evaluation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    :root {
      --blue: #173b6c;
      --blue2: #244a83;
      --blue3: #1e4d99;
      --bg: #f4f6f9;
      --text: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
      --line: #e5e7eb;

      --s5: #16a34a;
      --s4: #65a30d;
      --s3: #d97706;
      --s2: #ea580c;
      --s1: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--text);
      padding: 24px;
    }

    .wrap { max-width: 1120px; margin: auto; }

    /* ===== HEADER ===== */
    .head {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 12px 28px rgba(23,59,108,.22);
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 16px;
    }

    .head-left h2 { margin: 0 0 8px; font-size: 28px; letter-spacing: .2px; }
    .head-left div { opacity: .95; font-weight: 600; }

    /* ===== TAB NAV ===== */
    .tab-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: white;
      padding: 8px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(15,23,42,.07);
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      color: var(--muted);
      border: 0;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      transition: .18s ease;
      box-shadow: none;
    }

    .tab-btn.active {
      background: var(--blue);
      color: white;
      box-shadow: 0 6px 16px rgba(23,59,108,.25);
    }

    .tab-btn:hover:not(.active) { background: #f1f5ff; color: var(--blue); }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 18px;
      margin: 16px 0;
      box-shadow: 0 8px 22px rgba(15,23,42,.08);
      border: 1px solid rgba(226,232,240,.9);
    }

    .section-title { font-size: 20px; margin: 0 0 14px; color: var(--blue); }

    /* ===== EMPLOYEE LIST ===== */
    .emp {
      cursor: pointer;
      border-left: 7px solid var(--blue);
      transition: .18s ease;
    }

    .emp:hover {
      transform: translateY(-2px);
      background: #f1f7ff;
      box-shadow: 0 12px 28px rgba(23,59,108,.14);
    }

    .employee-name { margin: 0 0 8px; font-size: 21px; color: var(--blue); }

    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .info-box {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .info-label { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
    .info-value { font-weight: 700; color: var(--text); }

    /* ===== SCORE GUIDE ===== */
    .score-visual { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

    .score-guide {
      border-radius: 16px;
      padding: 14px;
      color: white;
      min-height: 124px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 8px 16px rgba(15,23,42,.10);
    }

    .score-guide .num { font-size: 30px; font-weight: 800; line-height: 1; }
    .score-guide .name { font-weight: 800; margin: 8px 0 4px; }
    .score-guide .desc { font-size: 13px; line-height: 1.45; opacity: .96; }

    .s5 { background: var(--s5); }
    .s4 { background: var(--s4); }
    .s3 { background: var(--s3); }
    .s2 { background: var(--s2); }
    .s1 { background: var(--s1); }

    /* ===== HEART GUIDE ===== */
    .heart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .heart-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfdff;
    }

    .heart-name { color: var(--blue); font-weight: 800; margin-bottom: 6px; }
    .heart-meaning { font-weight: 700; margin-bottom: 6px; }
    .heart-method { color: var(--muted); font-size: 14px; line-height: 1.45; }

    /* ===== QUESTION FORM ===== */
    .q {
      background: white;
      padding: 20px;
      border-radius: 18px;
      margin: 16px 0;
      border: 1px solid var(--line);
      box-shadow: 0 6px 18px rgba(15,23,42,.06);
    }

    .q-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .core {
      display: inline-flex;
      align-items: center;
      background: #eaf2ff;
      color: var(--blue);
      font-weight: 800;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .q-no { color: var(--muted); font-weight: 700; font-size: 13px; }

    .question-text { font-size: 17px; font-weight: 800; line-height: 1.5; margin-bottom: 12px; }

    .meta {
      font-size: 14px;
      color: #4b5563;
      margin-top: 10px;
      line-height: 1.6;
      background: #f8fafc;
      padding: 12px;
      border-radius: 14px;
      border: 1px dashed #cbd5e1;
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .score-option { cursor: pointer; }
    .score-option input { display: none; }

    .score-pill {
      display: block;
      text-align: center;
      padding: 12px 8px;
      border-radius: 14px;
      border: 2px solid var(--line);
      background: #ffffff;
      font-weight: 800;
      transition: .18s ease;
    }

    .score-option input:checked + .score-pill { color: white; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(15,23,42,.18); }
    .score-option input[value="5"]:checked + .score-pill { background: var(--s5); border-color: var(--s5); }
    .score-option input[value="4"]:checked + .score-pill { background: var(--s4); border-color: var(--s4); }
    .score-option input[value="3"]:checked + .score-pill { background: var(--s3); border-color: var(--s3); }
    .score-option input[value="2"]:checked + .score-pill { background: var(--s2); border-color: var(--s2); }
    .score-option input[value="1"]:checked + .score-pill { background: var(--s1); border-color: var(--s1); }

    textarea {
      width: 100%;
      min-height: 70px;
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      padding: 12px;
      font-family: Arial, sans-serif;
      resize: vertical;
      outline: none;
    }

    textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(23,59,108,.12); }

    button {
      background: var(--blue);
      color: white;
      border: 0;
      padding: 13px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 8px 18px rgba(23,59,108,.18);
    }

    button.gray { background: #64748b; box-shadow: none; }
    button.green { background: #16a34a; }
    button.outline { background: transparent; color: var(--blue); border: 2px solid var(--blue); box-shadow: none; }

    button:disabled { background: #aaa; cursor: not-allowed; }

    .action-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    .loading { text-align: center; padding: 32px; color: var(--muted); font-weight: 700; }

    /* ===== DASHBOARD ===== */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }

    .stat-box {
      background: white;
      border-radius: 18px;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(15,23,42,.08);
      border: 1px solid var(--line);
    }

    .stat-box .stat-val { font-size: 32px; font-weight: 800; color: var(--blue); line-height: 1; }
    .stat-box .stat-label { font-size: 13px; color: var(--muted); margin-top: 6px; font-weight: 600; }

    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-box { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 6px 18px rgba(15,23,42,.08); border: 1px solid var(--line); }
    .chart-box canvas { max-height: 280px; }

    /* ===== EMPLOYEE TABLE ===== */
    .emp-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .emp-table th { background: #f1f5fb; color: var(--blue); font-weight: 800; padding: 12px 14px; text-align: left; border-bottom: 2px solid var(--line); }
    .emp-table td { padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .emp-table tr:hover td { background: #f8fbff; }

    .score-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      font-size: 13px;
    }

    .emp-detail-btn {
      background: transparent;
      color: var(--blue);
      border: 2px solid var(--blue);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
    }

    .emp-detail-btn:hover { background: var(--blue); color: white; }

    /* ===== INDIVIDUAL DETAIL ===== */
    .detail-header {
      background: linear-gradient(135deg, var(--blue), var(--blue3));
      color: white;
      padding: 24px 28px;
      border-radius: 18px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .detail-header h3 { margin: 0 0 6px; font-size: 22px; }
    .detail-header .sub { opacity: .85; font-size: 15px; }

    .score-big {
      background: rgba(255,255,255,.15);
      border-radius: 16px;
      padding: 14px 24px;
      text-align: center;
    }

    .score-big .val { font-size: 40px; font-weight: 800; line-height: 1; }
    .score-big .label { font-size: 13px; opacity: .85; margin-top: 4px; }

    .cv-section { margin-bottom: 14px; }

    .cv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .cv-title { font-size: 16px; font-weight: 800; color: var(--blue); }

    .cv-avg {
      padding: 5px 14px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      font-size: 14px;
    }

    .q-row {
      background: #f9fafb;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 4px solid var(--line);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .q-score-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .q-content { flex: 1; }
    .q-text { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
    .q-note { font-size: 13px; color: var(--muted); }

    .progress-bar-wrap { background: #e5e7eb; border-radius: 999px; height: 8px; margin-top: 6px; }
    .progress-bar { height: 8px; border-radius: 999px; }

    /* ===== PDF PRINT ===== */
    @media print {
      body { padding: 0; background: white !important; }
      .wrap { max-width: none; }
      .tab-nav, .no-print, .head, .action-row { display: none !important; }
      .card { box-shadow: none !important; border: 1px solid #ddd !important; }
      .pdf-page { page-break-after: always; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 800px) {
      body { padding: 14px; }
      .head { padding: 22px; border-radius: 18px; }
      .head-left h2 { font-size: 22px; }
      .score-visual, .stat-grid { grid-template-columns: 1fr 1fr; }
      .chart-grid { grid-template-columns: 1fr; }
      .heart-grid { grid-template-columns: 1fr; }
      .score-row { grid-template-columns: repeat(3, 1fr); }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="head">
    <div class="head-left">
      <h2>K.C. HEART Core Value Evaluation</h2>
      <div>ผู้ประเมิน: สุชานรี กองพลพรหม</div>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tab-evaluate" onclick="switchTab('evaluate')">📋 ประเมิน</button>
    <button class="tab-btn" id="tab-dashboard" onclick="switchTab('dashboard')">📊 ผลคะแนน</button>
  </div>

  <div id="app-evaluate"></div>
  <div id="app-dashboard" style="display:none"></div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby-T2AJE7CFzCAuZgGqo_cIHdkmoW7HGocKNyH6xvyTUKg4fZ5ulNhBTX-br4WMWOc4uQ/exec';
const EVALUATOR_NAME = 'สุชานรี กองพลพรหม';

let employees = [];
let selectedEmployee = null;
let questions = [];
let scoreGuide = [];
let submitting = false;
let currentTab = 'evaluate';
let dashboardData = null;
let chartInstances = {};

const defaultScoreGuide = [
  { score: 5, meaning: 'ดีเยี่ยม / เป็นแบบอย่าง', description: 'ปฏิบัติสม่ำเสมอ มีหลักฐานชัดเจน และเป็นตัวอย่างให้ผู้อื่น' },
  { score: 4, meaning: 'ดี / ผ่านมาตรฐาน', description: 'ปฏิบัติได้ดี มีหลักฐานสนับสนุน ไม่มีประเด็นสำคัญ' },
  { score: 3, meaning: 'พอใช้ / เฝ้าระวัง', description: 'ปฏิบัติได้บางส่วน แต่ยังไม่สม่ำเสมอหรือหลักฐานไม่ครบ' },
  { score: 2, meaning: 'ต้องปรับปรุง', description: 'พบข้อบกพร่องชัดเจน ต้องมีแผนแก้ไข' },
  { score: 1, meaning: 'ไม่ปฏิบัติ / เสี่ยงสูง', description: 'ไม่พบการปฏิบัติ หรือพบพฤติกรรมขัดกับ Core Value' }
];

const heartGuide = [
  { name: 'Hospitality', meaning: 'บริการด้วยความจริงใจ', method: 'ดูวิธีสื่อสาร การรับฟัง การช่วยเหลือ และ Feedback' },
  { name: 'Excellence', meaning: 'มุ่งมั่นสู่ความเป็นเลิศทุกด้าน', method: 'ดูความถูกต้อง มาตรฐาน รายละเอียด และการปรับปรุงงาน' },
  { name: 'Accountability', meaning: 'รักษามาตรฐานสูงสุด', method: 'ดูงานค้าง การติดตาม การรายงาน และการรับผิดชอบข้อผิดพลาด' },
  { name: 'Responsibility', meaning: 'รับผิดชอบผลลัพธ์', method: 'ดูวินัย ความปลอดภัย การรักษาความลับ และทรัพย์สินบริษัท' },
  { name: 'Teamwork', meaning: 'ทำงานเป็นทีม', method: 'ดูการประสานงาน ช่วยเหลือทีม และงานข้ามฝ่าย' }
];

// ===========================
// TAB SWITCHING
// ===========================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('app-evaluate').style.display = tab === 'evaluate' ? 'block' : 'none';
  document.getElementById('app-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
  document.getElementById('tab-evaluate').classList.toggle('active', tab === 'evaluate');
  document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');

  if (tab === 'dashboard') loadDashboard();
}

// ===========================
// API
// ===========================
function api(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');

    const timer = setTimeout(() => {
      reject(new Error('Apps Script ไม่ตอบกลับ'));
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }, 15000);

    window[callbackName] = function(data) {
      clearTimeout(timer);
      resolve(data);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    const params = new URLSearchParams();
    params.set('action', action);
    params.set('callback', callbackName);
    Object.keys(payload).forEach(key => {
      params.set(key, typeof payload[key] === 'object' ? JSON.stringify(payload[key]) : payload[key]);
    });

    script.src = WEB_APP_URL + '?' + params.toString();
    script.onerror = () => {
      clearTimeout(timer);
      reject(new Error('โหลดข้อมูลไม่สำเร็จ'));
    };

    document.body.appendChild(script);
  });
}

async function apiPost(action, payload = {}) {
  await fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ action, ...payload })
  });
  return { success: true };
}

// ===========================
// UTILS
// ===========================
function getScoreColor(score) {
  const s = Number(score);
  if (s >= 4.5) return '#16a34a';
  if (s >= 3.5) return '#65a30d';
  if (s >= 2.5) return '#d97706';
  if (s >= 1.5) return '#ea580c';
  return '#dc2626';
}

function getScoreClass(score) {
  const s = Number(score);
  if (s >= 4.5) return 's5';
  if (s >= 3.5) return 's4';
  if (s >= 2.5) return 's3';
  if (s >= 1.5) return 's2';
  return 's1';
}

function getScoreLabel(score) {
  const s = Number(score);
  if (s >= 4.5) return 'ดีเยี่ยม';
  if (s >= 3.5) return 'ดี';
  if (s >= 2.5) return 'พอใช้';
  if (s >= 1.5) return 'ต้องปรับปรุง';
  return 'ไม่ปฏิบัติ';
}

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
}

// ===========================
// EVALUATE TAB
// ===========================
function showLoading(text, target = 'app-evaluate') {
  document.getElementById(target).innerHTML = `<div class="card loading">${text}</div>`;
}

function showError(error, target = 'app-evaluate') {
  document.getElementById(target).innerHTML = `
    <div class="card">
      <h3>เกิดข้อผิดพลาด</h3>
      <div>${error}</div>
      <br>
      <button onclick="loadData()">ลองใหม่</button>
    </div>
  `;
}

window.onload = async function () {
  await loadData();
};

async function loadData() {
  try {
    showLoading('กำลังโหลดรายชื่อพนักงานที่รอประเมิน...');
    const result = await api('init', { evaluatorName: EVALUATOR_NAME });
    if (!result.success) throw new Error(result.message || 'โหลดข้อมูลไม่สำเร็จ');
    employees = result.employees || [];
    scoreGuide = (result.scoreGuide && result.scoreGuide.length) ? result.scoreGuide : defaultScoreGuide;
    renderEmployeeList();
  } catch (err) {
    showError(err.message || err);
  }
}

function renderGuideBoxes() {
  const sortedScore = [...scoreGuide].sort((a, b) => Number(b.score) - Number(a.score));

  return `
    <div class="card">
      <h3 class="section-title">เกณฑ์การให้คะแนน</h3>
      <div class="score-visual">
        ${sortedScore.map(g => `
          <div class="score-guide s${g.score}">
            <div><div class="num">${g.score}</div><div class="name">${g.meaning}</div></div>
            <div class="desc">${g.description}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="card">
      <h3 class="section-title">HEART การประเมิน</h3>
      <div class="heart-grid">
        ${heartGuide.map(h => `
          <div class="heart-item">
            <div class="heart-name">${h.name}</div>
            <div class="heart-meaning">${h.meaning}</div>
            <div class="heart-method">${h.method}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderEmployeeList() {
  const app = document.getElementById('app-evaluate');

  let html = `
    <div class="card">
      <h3 class="section-title">รายการรอประเมิน</h3>
      <div class="info-grid">
        <div class="info-box"><div class="info-label">ผู้ประเมิน</div><div class="info-value">${EVALUATOR_NAME}</div></div>
        <div class="info-box"><div class="info-label">จำนวนที่รอประเมิน</div><div class="info-value">${employees.length} คน</div></div>
        <div class="info-box"><div class="info-label">สถานะ</div><div class="info-value">พร้อมประเมิน</div></div>
      </div>
    </div>
  `;

  if (employees.length === 0) {
    html += `<div class="card">✅ ไม่มีรายชื่อพนักงานที่รอประเมินแล้ว</div>`;
    app.innerHTML = html;
    return;
  }

  html += `<h3 class="section-title">รายชื่อพนักงานที่ยังไม่ประเมิน</h3>`;

  employees.forEach((emp, i) => {
    html += `
      <div class="card emp" onclick="openForm(${i})">
        <h3 class="employee-name">${emp.employee}</h3>
        <div class="info-grid">
          <div class="info-box"><div class="info-label">ตำแหน่ง</div><div class="info-value">${emp.employeePosition}</div></div>
          <div class="info-box"><div class="info-label">สังกัด</div><div class="info-value">${emp.bu}</div></div>
          <div class="info-box"><div class="info-label">สถานะ</div><div class="info-value">รอประเมิน</div></div>
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
}

async function openForm(index) {
  try {
    selectedEmployee = employees[index];
    showLoading('กำลังโหลดแบบประเมิน...');
    const result = await api('getForm', { employeeData: selectedEmployee });
    if (!result.success) throw new Error(result.message || 'โหลดแบบประเมินไม่สำเร็จ');
    questions = result.questions || [];
    renderForm();
  } catch (err) {
    showError(err.message || err);
  }
}

function renderForm() {
  const app = document.getElementById('app-evaluate');

  let html = `
    <div class="card">
      <h3 class="section-title">แบบประเมิน: ${selectedEmployee.employee}</h3>
      <div class="info-grid">
        <div class="info-box"><div class="info-label">ตำแหน่ง</div><div class="info-value">${selectedEmployee.employeePosition}</div></div>
        <div class="info-box"><div class="info-label">สังกัด</div><div class="info-value">${selectedEmployee.bu}</div></div>
        <div class="info-box"><div class="info-label">จำนวนข้อประเมิน</div><div class="info-value">${questions.length} ข้อ</div></div>
      </div>
    </div>
    ${renderGuideBoxes()}
  `;

  if (questions.length === 0) {
    html += `<div class="card">ไม่พบคำถามของตำแหน่งนี้ในชีท ${selectedEmployee.bu}</div>`;
    html += `<div class="action-row"><button class="gray" onclick="renderEmployeeList()">กลับ</button></div>`;
    app.innerHTML = html;
    return;
  }

  questions.forEach((q, i) => {
    html += `
      <div class="q">
        <div class="q-top">
          <div class="core">${q.coreValue}</div>
          <div class="q-no">ข้อที่ ${i + 1}</div>
        </div>
        <div class="question-text">${q.checklist}</div>
        <div class="meta">
          <b>หลักฐานที่ใช้ตรวจ:</b> ${q.evidence || '-'}<br>
          <b>วิธีตรวจสอบ:</b> ${q.method || '-'}
        </div>
        <div class="score-row">
          ${[5,4,3,2,1].map(s => `
            <label class="score-option">
              <input type="radio" name="score_${i}" value="${s}">
              <span class="score-pill">${s}</span>
            </label>
          `).join('')}
        </div>
        <textarea id="note_${i}" placeholder="หมายเหตุเพิ่มเติม เช่น หลักฐานที่พบ / ข้อสังเกต"></textarea>
      </div>
    `;
  });

  html += `
    <div class="action-row">
      <button class="gray" onclick="renderEmployeeList()">กลับ</button>
      <button id="submitBtn" onclick="submitEvaluation()">ส่งผลประเมิน</button>
    </div>
  `;

  app.innerHTML = html;
}

async function submitEvaluation() {
  if (submitting) return;
  try {
    const answers = [];
    for (let i = 0; i < questions.length; i++) {
      const checked = document.querySelector(`input[name="score_${i}"]:checked`);
      if (!checked) { alert(`กรุณาให้คะแนนข้อที่ ${i + 1}`); return; }
      answers.push({ ...questions[i], score: checked.value, note: document.getElementById(`note_${i}`).value });
    }

    const payload = {
      evaluator: selectedEmployee.evaluator,
      evaluatorPosition: selectedEmployee.evaluatorPosition,
      employee: selectedEmployee.employee,
      employeePosition: selectedEmployee.employeePosition,
      bu: selectedEmployee.bu,
      answers
    };

    submitting = true;
    const btn = document.getElementById('submitBtn');
    if (btn) btn.disabled = true;
    showLoading('กำลังบันทึกผลการประเมิน...');

    await apiPost('submit', { payload });
    alert('บันทึกผลการประเมินเรียบร้อยแล้ว');
    submitting = false;
    dashboardData = null;
    await loadData();
  } catch (err) {
    submitting = false;
    showError(err.message || err);
  }
}

async function loadDashboard() {
  if (dashboardData) {
    renderDashboard(dashboardData);
    return;
  }

  showLoading('กำลังโหลดผลคะแนน...', 'app-dashboard');

  try {
    const result = await api('getOverview', { evaluatorName: EVALUATOR_NAME });
    if (!result.success) throw new Error(result.message || 'โหลดข้อมูลไม่สำเร็จ');
    dashboardData = result;
    renderDashboard(result);
  } catch (err) {
    showError(err.message || err, 'app-dashboard');
  }
}

              <th>ระดับ</th>

async function showIndividualDetail(empSummary) {
  const app = document.getElementById('app-dashboard');
  app.innerHTML = `<div class="card loading">กำลังโหลดรายละเอียด...</div>`;

  try {
    // Get full detail from result sheet via getOverview (already has individual data)
    // We'll call a dedicated detail view using dashboard data we already have
    // but we need per-question breakdown – re-fetch from overview with a filter
    const result = await api('getOverview', { evaluatorName: EVALUATOR_NAME });
    dashboardData = result;

    // Filter raw data for this employee from individual breakdown
    const empData = result.individual.find(e => e.employee === empSummary.employee);

    renderIndividualDetail(empSummary, result);
  } catch (err) {
    showError(err.message || err, 'app-dashboard');
  }
}
